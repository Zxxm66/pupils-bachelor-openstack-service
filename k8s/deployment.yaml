apiVersion: apps/v1
kind: Deployment
metadata:
  name: pupils-bachelor-deployment
  namespace: pupils-bachelor
  labels:
    app: pupils-bachelor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pupils-bachelor
  template:
    metadata:
      labels:
        app: pupils-bachelor
    spec:
      containers:
        - name: pupils-bachelor
          image: DOCKERHUB_USERNAME/pupils-bachelor-openstack-service:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
